on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/cabal.yml
      - cabal.project
      - "**/*.cabal"
      - "**/*.hs"
  workflow_dispatch:

# Below copies significantly from
# https://github.com/haskell-actions/setup/blob/v2.6.2/README.md

# INFO: The following configuration block ensures that only one build runs per branch,
# which may be desirable for projects with a costly build process.
# Remove this block from the CI workflow to let each CI job run to completion.
concurrency:
  group: build-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name != 'push' }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ghc-version: ['9.10']
    defaults:
      run:
        shell: bash -euo pipefail {0}
    env:
      # false for non-PR triggers
      IS_RENOVATE: ${{ startsWith(github.head_ref, 'renovate/') }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: ${{ env.IS_RENOVATE == 'true' && '0' || '1' }}

      - name: Set up GHC ${{ matrix.ghc-version }}
        uses: haskell-actions/setup@cd0d9bdd65b20557f41bea4dbe43d0b5fbbfe553 # v2.11
        id: setup
        with:
          ghc-version: ${{ matrix.ghc-version }}
          # Defaults, added for clarity:
          cabal-version: 'latest'
          cabal-update: true

      - name: Check cabal file for auth-server
        run: cabal check
        working-directory: auth-server

      - name: Check cabal file for agent
        run: cabal check
        working-directory: agent

        # inspired by, but distinct from,
        # https://github.com/haskell-actions/setup/blob/main/docs/examples.md#dependency-updates
      - name: Require new package versions are tested
        if: env.IS_RENOVATE == 'true'
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          git log \
            --format="%(trailers:key=New-hackage-version,valueonly=true)" \
            "$BASE..$HEAD" \
            | sort -u \
            | sed -re '/./ s/^/constraints: /' \
            | tee -a cabal.project

      - name: Configure the build
        run: |
          cabal configure --enable-tests --enable-benchmarks --disable-documentation
          cabal build all --dry-run
        # The last step generates dist-newstyle/cache/plan.json for the cache key.

      - name: Restore cached dependencies
        uses: actions/cache/restore@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        id: cache
        env:
          key: ${{ runner.os }}-ghc-${{ steps.setup.outputs.ghc-version }}-cabal-${{ steps.setup.outputs.cabal-version }}
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ env.key }}-plan-${{ hashFiles('**/plan.json') }}
          restore-keys: ${{ env.key }}-

      - name: Install dependencies
        # If we had an exact cache hit, the dependencies will be up to date.
        if: steps.cache.outputs.cache-hit != 'true'
        run: cabal build all --only-dependencies

      # Cache dependencies already here, so that we do not have to rebuild them should the subsequent steps fail.
      - name: Save cached dependencies
        uses: actions/cache/save@2c8a9bd7457de244a408f35966fab2fb45fda9c8 # v6.0.0
        # If we had an exact cache hit, trying to save the cache would error because of key clash.
        if: steps.cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - run: cabal build all

      - run: cabal test all
