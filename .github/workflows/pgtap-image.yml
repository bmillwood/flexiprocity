name: Build postgres-pgtap image

on:
  push:
    branches:
      - main
    paths:
      - ci/postgres-pgtap.Dockerfile
      - .github/workflows/pgtap-image.yml
  pull_request:
    paths:
      - ci/postgres-pgtap.Dockerfile
      - .github/workflows/pgtap-image.yml
  workflow_dispatch:

concurrency:
  group: postgres-image-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ci/postgres-pgtap.Dockerfile
          tags: ghcr.io/${{ github.repository }}/postgres-pgtap:16
          push: ${{ github.event_name != 'pull_request' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
