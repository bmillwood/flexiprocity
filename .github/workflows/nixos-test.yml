on:
  push:
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/nixos-test.yml
      - tests/**
      - config.nix
      - schema/config.nix
      - schema/structure.sql
      - postgraphile/**
      - secrets/new-jwt-key.sh
      - agent/**
      - auth-server/**
      - frontend/**

env:
  nixpkgs_version: e73de5be04e0eff4190a1432b946d469c794e7b4 # renovate: datasource=git-refs depName=NixOS/nixpkgs packageName=https://github.com/NixOS/nixpkgs currentValue=nixos-unstable

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6
        with:
          nix_path: nixpkgs=https://github.com/NixOS/nixpkgs/archive/${{ env.nixpkgs_version }}.tar.gz
          extra_nix_config: |
            extra-experimental-features = auto-allocate-uids cgroups nix-command
            auto-allocate-uids = true

      - run: nix config show

      - run: nix-build tests/module.nix

      - run: diff -u result/schema.graphql postgraphile/schema.graphql
