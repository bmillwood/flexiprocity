# No pun intended.

on:
  pull_request:
    types: [opened, edited]

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  tidy:
    # Only Renovate PRs. Skip when we are the editor, so our own edits
    # don't re-trigger the workflow.
    if: github.event.sender.login == 'bmillwood-renovate[bot]'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -euo pipefail {0}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Strip noise from PR body
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          orig=$(mktemp)
          new=$(mktemp)
          gh pr view "$PR" --json body --jq .body > "$orig"
          python3 ci/amend_renovate_pr_body.py < "$orig" > "$new"
          if cmp -s "$orig" "$new"; then
            echo "No changes needed"
            exit 0
          fi
          gh pr edit "$PR" --body-file "$new"
